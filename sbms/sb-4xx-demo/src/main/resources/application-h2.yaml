# H2 Database (for development/testing)
spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ""

  # H2 Console (optional, for debugging)
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA/Hibernate settings
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true