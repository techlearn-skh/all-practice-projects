apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: kamalredhat-2025-dev
  name: 'ocp-swagger-demo'
spec:
  selector:
    matchLabels:
      app: ocp-swagger-demo
  replicas: 3
  template:
    metadata:
      labels:
        app: ocp-swagger-demo
    spec:
      containers:
        - name: ocp-swagger-demo
          image: >-
            docker.io/kamaltechlearn/ocp-swagger-demo:2.0
          ports:
            - containerPort: 9001
              protocol: TCP
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
